{% extends "core/base.html" %}

{% block title %}Testa il tuo agente — ZEUS{% endblock %}

{% block extra_head %}
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
{% endblock %}

{% block main_content %}
<section class="zeus-card p-6 sm:p-8">
    <h1 class="text-2xl font-bold font-display mb-4">Testa il tuo agente</h1>
    {% include "core/partials/agent_chat_content.html" %}
</section>
<script>
(function () {
    function scrollChatToBottom() {
        var log = document.querySelector('[data-chat-log]');
        if (log) log.scrollTop = log.scrollHeight;
    }

    window.addEventListener('load', scrollChatToBottom);

    document.body.addEventListener('htmx:afterRequest', function (event) {
        var form = event.detail.elt;
        if (!form || !form.matches('[data-chat-composer]')) return;
        if (!event.detail.successful) return;
        form.reset();
        var hint = document.querySelector('[data-chat-hint]');
        if (hint) hint.remove();
        scrollChatToBottom();
    });
})();
</script>
{% endblock %}
