{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ZEUS App Shell{% endblock %}</title>
    <script>
        try {
            document.documentElement.classList.toggle(
                "dark",
                localStorage.getItem("zeus-theme") === "dark"
            );
        } catch (error) {
            document.documentElement.classList.remove("dark");
        }
    </script>
    <link rel="stylesheet" href="{% static 'zeus-design.css' %}">
    {% block shell_head %}{% endblock %}
</head>
<body class="zeus-app-shell-body">
    <!-- app-shell:v1 -->
    <div id="app-shell" class="zeus-app-shell {% block shell_class %}{% endblock %}" data-app-shell="v1">
        <aside id="app-sidebar" class="zeus-app-shell__sidebar" aria-label="Navigazione principale">
            {% block shell_sidebar %}{% endblock %}
        </aside>
        <header id="app-header" class="zeus-app-shell__header">
            {% block shell_header %}{% endblock %}
        </header>
        <main id="app-main" class="zeus-app-shell__main" tabindex="-1">
            {% block shell_main %}{% endblock %}
        </main>
    </div>
    {% block shell_scripts %}{% endblock %}
</body>
</html>
