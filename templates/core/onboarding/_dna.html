<div id="dna-result">
    <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
            <p class="text-sm uppercase tracking-[0.2em] text-cyan-300">DNA v{{ dna.version }}</p>
            <h2 class="text-2xl font-semibold">DNA generato</h2>
        </div>
        {% if dna.confidence_score %}
            <span class="rounded-full bg-cyan-300/10 px-3 py-1 text-sm text-cyan-200">Score {{ dna.confidence_score }}/5</span>
        {% endif %}
    </div>

    <div class="mt-6 space-y-4">
        {% for section in sections %}
            <section class="rounded-2xl border border-white/10 bg-slate-950 p-4">
                <h3 class="font-medium text-cyan-200">{{ section.label }}</h3>
                <p class="mt-2 text-sm leading-6 text-slate-300">{{ section.value }}</p>
            </section>
        {% empty %}
            <pre class="whitespace-pre-wrap rounded-2xl border border-white/10 bg-slate-950 p-4 text-sm text-slate-300">{{ dna.content }}</pre>
        {% endfor %}
    </div>

    <div class="mt-6 flex flex-wrap gap-3">
        <a href="{% url 'onboarding-index' %}" class="rounded-2xl border border-white/10 px-4 py-2 text-sm text-slate-300 transition hover:bg-white/10">Torna all'onboarding</a>
        <button type="button" class="rounded-2xl bg-cyan-300 px-4 py-2 text-sm font-medium text-slate-950" disabled>Review DNA — slice #9</button>
    </div>
</div>
