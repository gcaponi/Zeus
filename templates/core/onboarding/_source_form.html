<form
    method="post"
    action="{% url 'onboarding-source-create' %}"
    enctype="multipart/form-data"
    hx-post="{% url 'onboarding-source-create' %}"
    hx-target="#onboarding-step"
    hx-swap="innerHTML"
    hx-encoding="multipart/form-data"
    class="space-y-5"
>
    {% csrf_token %}

    {% if error %}
        <div class="rounded-xl border border-red-400/30 bg-red-400/10 p-4 text-sm text-red-600">
            {{ error }}
        </div>
    {% endif %}

    <div>
        <label class="zeus-label" for="url">URL del sito aziendale</label>
        <input type="url" name="url" id="url" placeholder="https://www.manifattureacciai.com" class="zeus-input" required>
        <p class="mt-2 text-xs text-content-muted">Inserisci l'URL completo del sito principale della tua azienda.</p>
    </div>

    <div>
        <label class="zeus-label" for="company_file">Documenti aziendali (opzionale)</label>
        <input type="file" name="company_file" id="company_file" accept=".pdf,.txt,.md" class="zeus-input" style="padding: 0.6rem;">
        <p class="mt-2 text-xs text-content-muted">PDF, TXT o MD — brochure, presentazioni, documenti aziendali.</p>
    </div>

    <div>
        <label class="zeus-label" for="company_notes">Note aggiuntive (opzionale)</label>
        <textarea name="company_notes" id="company_notes" rows="3" class="zeus-input" placeholder="Descrivi brevemente la tua azienda, i prodotti principali, il mercato di riferimento..."></textarea>
    </div>

    <button type="submit" class="zeus-btn zeus-btn-primary w-full">
        Avvia analisi →
    </button>
</form>
