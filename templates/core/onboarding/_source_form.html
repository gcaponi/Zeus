<div class="max-w-2xl">
    <h2 class="text-xl font-medium">Aggiungi il sito web</h2>
    <p class="mt-2 text-sm text-slate-400">Inserisci l'URL principale dell'azienda. Se hai un documento o note interne, ZEUS li userà per rendere il pre-DNA più preciso.</p>

    {% if error %}
        <div class="mt-5 rounded-2xl border border-red-400/30 bg-red-400/10 p-4 text-sm text-red-200">
            {{ error }}
        </div>
    {% endif %}

    <form class="mt-6 space-y-4" method="post" enctype="multipart/form-data" action="{% url 'onboarding-source-create' %}" hx-post="{% url 'onboarding-source-create' %}" hx-encoding="multipart/form-data" hx-target="#onboarding-step" hx-swap="innerHTML">
        {% csrf_token %}
        <div>
            <label for="source_url" class="block text-sm font-medium text-slate-200">Sito web</label>
            <input id="source_url" name="url" type="url" placeholder="https://example.com" required class="mt-2 w-full rounded-2xl border border-white/10 bg-slate-950 px-4 py-3 text-slate-100 placeholder:text-slate-600 focus:border-cyan-300 focus:outline-none focus:ring-2 focus:ring-cyan-300/30">
        </div>
        <div class="rounded-2xl border border-white/10 bg-white/[0.03] p-4">
            <label for="company_file" class="block text-sm font-medium text-slate-200">Documento aziendale opzionale</label>
            <input id="company_file" name="company_file" type="file" accept=".txt,.md,.pdf" class="mt-2 block w-full text-sm text-slate-300 file:mr-4 file:rounded-xl file:border-0 file:bg-cyan-300 file:px-4 file:py-2 file:text-sm file:font-medium file:text-slate-950">
            <label for="company_notes" class="mt-4 block text-sm font-medium text-slate-200">Note interne opzionali</label>
            <textarea id="company_notes" name="company_notes" rows="4" placeholder="Cose che il sito non dice: clienti target, vincoli, tono, promesse, limiti..." class="mt-2 w-full rounded-2xl border border-white/10 bg-slate-950 px-4 py-3 text-sm text-slate-100 placeholder:text-slate-600 focus:border-cyan-300 focus:outline-none focus:ring-2 focus:ring-cyan-300/30"></textarea>
            <p class="mt-2 text-xs text-slate-500">I file rispettano il limite del piano workspace impostato in admin.</p>
        </div>
        <button type="submit" class="w-full rounded-2xl bg-cyan-300 px-4 py-3 font-medium text-slate-950 transition hover:bg-cyan-200">Avvia analisi</button>
    </form>
</div>
