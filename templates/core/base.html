<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ZEUS{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Space Grotesk', 'Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            cyan: '#0891b2',
                            'cyan-light': '#22d3ee',
                            violet: '#7c3aed',
                            lime: '#a3e635',
                        },
                        surface: {
                            primary: '#f8fafc',
                            secondary: '#ffffff',
                            card: 'rgba(255, 255, 255, 0.72)',
                            input: 'rgba(241, 245, 249, 0.78)',
                        },
                        content: {
                            primary: '#07111f',
                            secondary: '#475569',
                            muted: '#64748b',
                        },
                    },
                    borderRadius: {
                        '2xl': '1rem',
                        '3xl': '1.4rem',
                    },
                },
            },
        }
    </script>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.72);
            --bg-input: rgba(241, 245, 249, 0.78);
            --border-color: rgba(15, 23, 42, 0.1);
            --border-hover: rgba(8, 145, 178, 0.44);
            --text-primary: #07111f;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --accent-cyan: #0891b2;
            --accent-cyan-light: #22d3ee;
            --accent-violet: #7c3aed;
            --accent-lime: #a3e635;
            --accent-cyan-bg: rgba(8, 145, 178, 0.1);
            --glow-cyan: rgba(34, 211, 238, 0.34);
            --glass: rgba(255, 255, 255, 0.72);
            --glass-strong: rgba(255, 255, 255, 0.88);
            --shadow-soft: 0 24px 90px rgba(15, 23, 42, 0.12);
        }

        * { box-sizing: border-box; }

        html {
            min-height: 100%;
            background: var(--bg-primary);
        }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at 20% 0%, rgba(34, 211, 238, 0.14), transparent 30rem),
                radial-gradient(circle at 80% 16%, rgba(124, 58, 237, 0.12), transparent 32rem),
                var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            content: '';
            opacity: 0.18;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="n"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23n)" opacity="0.45"/%3E%3C/svg%3E');
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            letter-spacing: -0.045em;
            color: var(--text-primary);
        }

        .zeus-nav {
            position: fixed;
            top: 1rem;
            left: 50%;
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: min(1180px, calc(100vw - 2rem));
            min-height: 4rem;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            background: var(--glass-strong);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(20px);
            transform: translateX(-50%);
        }

        .zeus-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            color: var(--text-primary);
            text-decoration: none;
        }

        .zeus-brand-dot {
            width: 2rem;
            height: 2rem;
            border-radius: 0.6rem;
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.12), rgba(124, 58, 237, 0.12));
            border: 1px solid var(--border-color);
            display: grid;
            place-items: center;
            font-size: 0.9rem;
        }

        .zeus-nav-links {
            display: flex;
            gap: 0.3rem;
        }

        .zeus-nav-links a {
            padding: 0.6rem 1rem;
            border-radius: 999px;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .zeus-nav-links a:hover {
            background: var(--accent-cyan-bg);
            color: var(--accent-cyan-light);
        }

        .zeus-card {
            border: 1px solid var(--border-color);
            border-radius: 1.6rem;
            background: var(--glass);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(20px);
            transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
        }

        .zeus-card:hover {
            border-color: var(--border-hover);
            box-shadow: 0 30px 100px rgba(34, 211, 238, 0.14);
        }

        .zeus-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .zeus-btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan-light), var(--accent-violet));
            color: #020617;
            box-shadow: 0 20px 70px rgba(34, 211, 238, 0.24);
        }

        .zeus-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 28px 80px rgba(34, 211, 238, 0.32);
        }

        .zeus-btn-ghost {
            border-color: var(--border-color);
            background: var(--glass);
            color: var(--text-primary);
            backdrop-filter: blur(16px);
        }

        .zeus-btn-ghost:hover {
            border-color: var(--border-hover);
            color: var(--accent-cyan-light);
        }

        .zeus-input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .zeus-input:focus {
            outline: none;
            border-color: var(--border-hover);
            box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.1);
        }

        .zeus-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .zeus-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .zeus-badge-cyan {
            background: var(--accent-cyan-bg);
            color: var(--accent-cyan-light);
        }

        .zeus-badge-lime {
            background: rgba(163, 230, 53, 0.12);
            color: var(--accent-lime);
        }

        .zeus-badge-violet {
            background: rgba(124, 58, 237, 0.1);
            color: var(--accent-violet);
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--accent-cyan-light) 0%, var(--accent-violet) 55%, var(--accent-lime) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glow-cyan {
            box-shadow: 0 0 20px var(--glow-cyan), 0 0 60px rgba(34, 211, 238, 0.12);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen">
    {% block nav %}
    <nav class="zeus-nav">
        <a href="{% url 'onboarding-index' %}" class="zeus-brand">
            <span class="zeus-brand-dot">⚡</span>
            ZEUS
        </a>
        <div class="zeus-nav-links">
            <a href="{% url 'onboarding-index' %}">Onboarding</a>
            <a href="{% url 'product-list-create' %}">Prodotti</a>
        </div>
        <a href="{% url 'account_logout' %}" class="zeus-btn zeus-btn-ghost" style="padding: 0.5rem 1rem; font-size: 0.82rem;">
            Logout
        </a>
    </nav>
    {% endblock %}

    <main class="pt-24 pb-12 px-4">
        {% block content %}{% endblock %}
    </main>

    <script>
        document.body.addEventListener('htmx:configRequest', function(event) {
            event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
