<div id="generating-popup" class="fixed inset-0 z-50 hidden items-center justify-center" style="background: rgba(2,6,23,0.5); backdrop-filter: blur(6px);">
    <div class="zeus-card p-8 text-center mx-4" style="max-width: min(360px, calc(100vw - 2rem)); background: rgba(255,255,255,0.08); backdrop-filter: blur(40px) saturate(180%); border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 24px 80px rgba(0,0,0,0.4);">
        <div class="mb-5 flex justify-center">
            <div class="w-12 h-12 rounded-full border-[3px] border-brand-cyan-light border-t-transparent animate-spin"></div>
        </div>
        <h3 class="text-lg font-bold font-display text-white">Stiamo generando il DNA Specialista</h3>
        <p class="mt-2 text-sm text-white">
            ZEUS sta valutando le risposte e preparando il DNA completo<span id="generating-dots"></span>
        </p>
    </div>
</div>

<script>
function showGeneratingPopup() {
    var popup = document.getElementById('generating-popup');
    popup.classList.remove('hidden');
    popup.classList.add('flex');
    var dotsEl = document.getElementById('generating-dots');
    var n = 0;
    window._generatingInterval = setInterval(function() {
        n = (n + 1) % 4;
        dotsEl.textContent = '.'.repeat(n);
    }, 400);
}
</script>
