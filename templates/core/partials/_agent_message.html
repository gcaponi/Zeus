{% if message.role == 'user' %}
<div class="zeus-app-chat-message zeus-app-chat-message--user">
    <div class="zeus-app-chat-bubble-stack">
        <p class="zeus-app-chat-message-role">Tu</p>
        <div class="zeus-app-chat-message-body">{{ message.content|linebreaksbr }}</div>
    </div>
    <span class="zeus-app-chat-avatar zeus-app-chat-avatar--user" aria-hidden="true">🧑‍💼</span>
</div>
{% else %}
<div class="zeus-app-chat-message zeus-app-chat-message--assistant">
    <span class="zeus-app-chat-avatar zeus-app-chat-avatar--assistant" aria-hidden="true">🤖</span>
    <div class="zeus-app-chat-bubble-stack">
        <p class="zeus-app-chat-message-role">Il tuo agente</p>
        <div class="zeus-app-chat-message-body">{{ message.content|linebreaksbr }}</div>
    </div>
</div>
{% endif %}
