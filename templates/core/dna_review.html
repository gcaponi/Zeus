{% extends "core/base.html" %}

{% block title %}Revisione DNA — ZEUS{% endblock %}

{% block extra_head %}
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
    #dna-popup-overlay .dna-popup-panel {
        color: #f8fafc;
        margin: 1rem;
    }

    #dna-popup-overlay .dna-popup-title,
    #dna-popup-overlay .dna-popup-meta,
    #dna-popup-overlay .dna-popup-close,
    #dna-popup-overlay .dna-popup-section-text {
        color: #f8fafc !important;
    }

    @media (max-width: 480px) {
        #dna-popup-overlay .dna-popup-panel { max-height: 92vh; }
        #dna-popup-overlay .sticky.top-0,
        #dna-popup-overlay .sticky.bottom-0 { padding-left: 1.25rem; padding-right: 1.25rem; }
        #dna-popup-overlay .overflow-y-auto { padding-left: 1.25rem; padding-right: 1.25rem; }
    }

    #dna-popup-overlay .dna-popup-meta {
        opacity: 0.72;
    }

    #dna-popup-overlay .dna-popup-section-text {
        opacity: 0.94;
        text-shadow: 0 1px 18px rgba(0, 0, 0, 0.35);
    }
</style>
{% endblock %}

{% block content %}
<div class="zeus-page-wrap">
    <div class="zeus-page-grid">
        <section class="zeus-card p-6 sm:p-8">
            {% include "core/partials/dna_review_content.html" %}
        </section>

        <div class="zeus-page-sidebar">
            {% include "core/onboarding/_step_sidebar.html" %}
        </div>
    </div>
</div>

<script>
function openDnaPopup() {
    var overlay = document.getElementById('dna-popup-overlay');
    overlay.classList.remove('hidden');
    overlay.classList.add('flex');
    document.body.style.overflow = 'hidden';
}

function closeDnaPopup() {
    var overlay = document.getElementById('dna-popup-overlay');
    overlay.classList.add('hidden');
    overlay.classList.remove('flex');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeDnaPopup();
});

document.body.addEventListener('htmx:beforeRequest', function(event) {
    var button = event.detail.elt;
    if (!button || !button.matches('[data-approve-button]')) return;
    button.disabled = true;
    button.classList.add('opacity-70', 'cursor-wait');
    var label = button.querySelector('[data-approve-label]');
    if (label) label.textContent = 'Approvo...';
});

document.body.addEventListener('htmx:responseError', function(event) {
    var button = event.detail.elt;
    if (!button || !button.matches('[data-approve-button]')) return;
    button.disabled = false;
    button.classList.remove('opacity-70', 'cursor-wait');
    var label = button.querySelector('[data-approve-label]');
    if (label) label.textContent = 'Approva';
});
</script>
{% endblock %}
