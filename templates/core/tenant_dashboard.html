<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ tenant.name }} · Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f9fb;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: #fff;
            border-radius: 1.25rem;
            box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
            padding: 3rem 3.5rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .brand {
            font-size: .75rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #8b8fa3;
            margin-bottom: .25rem;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -.02em;
            margin-bottom: .5rem;
        }
        .info {
            color: #5b5f7a;
            line-height: 1.6;
            font-size: .9375rem;
            margin-bottom: 2rem;
        }
        .badge {
            display: inline-block;
            background: #eef0f5;
            border-radius: .375rem;
            padding: .25rem .75rem;
            font-size: .8125rem;
            color: #5b5f7a;
            margin-bottom: 1rem;
        }
        .btn {
            display: inline-block;
            padding: .75rem 2rem;
            border-radius: .625rem;
            font-size: .9375rem;
            font-weight: 500;
            text-decoration: none;
            transition: background .15s;
        }
        .btn-outline {
            background: transparent;
            color: #1a1a2e;
            border: 1px solid #e2e4ea;
        }
        .btn-outline:hover {
            border-color: #c4c7d2;
        }
        hr {
            border: none;
            border-top: 1px solid #eef0f5;
            margin: 2rem 0 1.5rem;
        }
        .home-link {
            font-size: .8125rem;
        }
        .home-link a {
            color: #8b8fa3;
            text-decoration: none;
        }
        .home-link a:hover { color: #1a1a2e; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">{{ tenant.schema_name }}.zeus.cais.uno</div>
        <h1>{{ tenant.name }}</h1>
        <div class="badge">Dashboard</div>
        <div class="info">
            <p>Logged in as <strong>{{ user.email }}</strong></p>
            <p>Workspace ready for configuration.</p>
        </div>
        <div class="actions">
            <a href="{% url 'onboarding-index' %}" class="btn btn-outline">Start onboarding</a>
            <a href="{% url 'account_logout' %}" class="btn btn-outline">Sign out</a>
        </div>
        <hr>
        <div class="home-link">
            <a href="{% url 'tenant-landing' %}">Back to workspace home</a>
        </div>
    </div>
</body>
</html>
