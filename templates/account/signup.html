<!DOCTYPE html>
<html>
<head>
    <title>ZEUS — Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <h1>Create your ZEUS account</h1>
    <form method="post" action="{% url 'account_signup' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create account</button>
    </form>
</body>
</html>
