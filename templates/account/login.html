<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Accedi · ZEUS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f9fb;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: #fff;
            border-radius: 1.25rem;
            box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
            padding: 3rem 3.5rem;
            max-width: 440px;
            width: 100%;
        }
        .brand {
            font-size: .75rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #8b8fa3;
            text-align: center;
            margin-bottom: 1.75rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: .25rem;
        }
        .subtitle {
            text-align: center;
            color: #5b5f7a;
            font-size: .875rem;
            margin-bottom: 2rem;
        }
        label {
            display: block;
            font-size: .8125rem;
            font-weight: 500;
            margin-bottom: .375rem;
            color: #1a1a2e;
        }
        input {
            width: 100%;
            padding: .75rem 1rem;
            border: 1px solid #e2e4ea;
            border-radius: .625rem;
            font-size: .9375rem;
            font-family: inherit;
            transition: border-color .15s;
            margin-bottom: 1.25rem;
            background: #fff;
            color: #1a1a2e;
        }
        input:focus {
            outline: none;
            border-color: #1a1a2e;
        }
        button {
            width: 100%;
            padding: .75rem;
            border: none;
            border-radius: .625rem;
            background: #1a1a2e;
            color: #fff;
            font-size: .9375rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background .15s;
        }
        button:hover { background: #2d2d4a; }
        .errorlist {
            list-style: none;
            color: #d94c4c;
            font-size: .8125rem;
            margin-bottom: 1rem;
        }
        .links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .8125rem;
        }
        .links a {
            color: #8b8fa3;
            text-decoration: none;
        }
        .links a:hover { color: #1a1a2e; }
        @media (max-width: 480px) {
            body { padding: 1.25rem; }
            .card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">ZEUS</div>
        <h1>Bentornato</h1>
        <p class="subtitle">Accedi al tuo workspace</p>
        {% if error %}
            <div class="errorlist">
                <p>{{ error }}</p>
            </div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            {% if form %}
                {{ form.non_field_errors }}
            {% endif %}
            <div>
                <label for="id_login">Email</label>
                <input type="email" name="login" id="id_login" autocomplete="email" required value="{{ request.GET.email|default:'' }}">
                {% if form %}
                    {{ form.login.errors }}
                {% endif %}
            </div>
            <div>
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" autocomplete="current-password" required>
                {% if form %}
                    {{ form.password.errors }}
                {% endif %}
            </div>
            <button type="submit">Accedi</button>
        </form>
        <div class="links">
            <a href="{% url 'account_signup' %}">Crea un account</a>
        </div>
    </div>
</body>
</html>
